name: Auto Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test || echo "No tests found"

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Get current version
        id: current_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Bump version
        if: "!contains(github.event.head_commit.message, 'ci: release')"
        run: npm version patch -m "ci: release %s"

      - name: Push version
        if: "!contains(github.event.head_commit.message, 'ci: release')"
        run: git push origin main --follow-tags

      - name: Get new version
        id: new_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Check version on npm
        id: check_version
        run: |
          npm view @investorphem/validator-tools@${{ steps.new_version.outputs.version }} version || echo "not_found=true" >> $GITHUB_OUTPUT

      - name: Publish to npm
        if: steps.check_version.outputs.not_found == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
